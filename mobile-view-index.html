<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Preview Shell</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0e10;
      color: #f4f4f5;
      display: grid;
      place-items: center;
      gap: 16px;
      padding: 20px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      border: 1px solid #2b2d31;
      background: #16181c;
      color: #f4f4f5;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #1f2228; }
    .phone {
      width: 375px;
      height: 667px;
      border-radius: 24px;
      overflow: hidden;
      border: 8px solid #2a2d33;
      background: #fff;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      transition: width 180ms ease, height 180ms ease;
    }
    .phone.small {
      width: 320px;
      height: 568px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .hint {
      color: #a7adb8;
      font-size: 13px;
      margin: 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="reload">Reload</button>
    <button id="toggle">Toggle 375x667 / 320x568</button>
  </div>

  <div class="phone" id="phone">
    <iframe id="preview" src="index.html" title="Mobile preview"></iframe>
  </div>

  <p class="hint">Quick layout check only. Validate on real phones and browser device emulation before shipping.</p>

  <script>
    const phone = document.getElementById("phone");
    const preview = document.getElementById("preview");
    document.getElementById("toggle").addEventListener("click", () => {
      phone.classList.toggle("small");
    });
    document.getElementById("reload").addEventListener("click", () => {
      preview.src = preview.src;
    });
  </script>
</body>
</html>
